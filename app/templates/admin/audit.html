{% extends 'base.html' %}
{% block content %}
<div class="page-header"><div><h2>Auditoría</h2></div></div>
<section class="card section-card">
  <form method="get" class="form-grid responsive-grid-3">
    <input type="text" name="action" placeholder="Acción" value="{{ action or '' }}">
    <input type="text" name="email" placeholder="Correo" value="{{ email or '' }}">
    <button type="submit">Filtrar</button>
  </form>
</section>
<section class="card section-card">
  <div class="table-wrap">
    <table class="table">
      <thead><tr><th>Fecha</th><th>Usuario</th><th>Acción</th><th>Detalle</th><th>IP</th></tr></thead>
      <tbody>
        {% for log in logs %}
        <tr>
          <td>{{ log.created_at }}</td>
          <td>{{ log.user.email if log.user else 'N/A' }}</td>
          <td>{{ log.action }}</td>
          <td>{{ log.detail }}</td>
          <td>{{ log.ip_address }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
